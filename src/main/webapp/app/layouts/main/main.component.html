<div class="flex flex-col h-screen bg-background-default text-text-primary">
  <jhi-header />

  <div [class.is-collapsed]="isSidebarCollapsed()" class="main-page flex flex-1 overflow-hidden">
    @if (loggedIn()) {
      <!-- Desktop sidebar: stays inline so the layout matches the existing experience. -->
      <jhi-sidebar
        class="hidden md:flex flex-none max-h-full overflow-y-auto shadow-[1px_0px_3px_0px_rgba(0,0,0,0.1)]"
        [isSidebarCollapsed]="isSidebarCollapsed()"
        (sidebarCollapsedChange)="toggleSidebar()"
      />
      <!-- Mobile sidebar: same component rendered inside a left drawer driven by the header burger. -->
      <!-- --sidebar-width is forced to 100% because the drawer is teleported out of .main-page where that CSS variable normally lives. -->
      <jhi-drawer
        position="left"
        panelClass="md:hidden !w-72 max-w-[85vw] [--sidebar-width:100%]"
        [modal]="false"
        [(open)]="mobileSidebarOpen"
      >
        <jhi-sidebar
          class="flex flex-1 max-h-full overflow-y-auto"
          [isSidebarCollapsed]="false"
          [isInDrawer]="true"
          (sidebarCollapsedChange)="closeMobileSidebar()"
        />
      </jhi-drawer>
    }
    <div #scrollContainer class="flex flex-col flex-1 overflow-auto">
      <div class="flex flex-col flex-1 w-full">
        <router-outlet (activate)="onActivate()" />
      </div>

      <jhi-footer />
    </div>
  </div>
</div>
<jhi-passkey-registration-prompt />
