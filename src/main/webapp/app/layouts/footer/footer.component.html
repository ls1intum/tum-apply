<div class="footer">
  <div class="logo-section">
    <span class="app-name" jhiTranslate="footer.tumApply"></span>
    <div class="footer-links">
      <a [href]="'https://github.com/ls1intum/tum-apply/releases'" target="_blank" rel="noopener"> {{ version }} </a>
    </div>
  </div>

  <div class="rights-section">
    <span class="copyright" jhiTranslate="footer.rightsText"></span>
  </div>

  <div class="legal-section">
    <button type="button" (click)="navigateToImprint()" class="footer-links">{{ 'footer.imprint' | translate }}</button>
    <span class="divider">|</span>
    <button type="button" (click)="navigateToPrivacy()" class="footer-links">{{ 'footer.privacy' | translate }}</button>
    <span class="divider">|</span>
    <button type="button" (click)="navigateToAboutUs()" class="footer-links">{{ 'footer.about-us' | translate }}</button>
  </div>
</div>
