<div class="page-container">
  <jhi-confirm-dialog
    label="button.confirm"
    header="researchGroup.adminView.confirmDialog.header"
    message="researchGroup.adminView.confirmDialog.message"
    severity="success"
    confirmIcon="check"
    [showOpenButton]="false"
    [visible]="showApproveDialog()"
    (confirmed)="onConfirmApprove()"
    (closed)="showApproveDialog.set(false)"
  />

  <jhi-confirm-dialog
    label="button.deny"
    header="researchGroup.adminView.denyConfirmDialog.header"
    message="researchGroup.adminView.denyConfirmDialog.message"
    severity="danger"
    confirmIcon="times"
    [showOpenButton]="false"
    [visible]="showDenyDialog()"
    (confirmed)="onConfirmDeny()"
    (closed)="showDenyDialog.set(false)"
  />

  <jhi-confirm-dialog
    label="button.withdraw"
    header="researchGroup.adminView.withdrawConfirmDialog.header"
    message="researchGroup.adminView.withdrawConfirmDialog.message"
    severity="danger"
    confirmIcon="withdraw"
    [showOpenButton]="false"
    [visible]="showWithdrawDialog()"
    (confirmed)="onConfirmWithdraw()"
    (closed)="showWithdrawDialog.set(false)"
  />
  <div class="header-container">
    <div class="page-header">
      <h1 jhiTranslate="researchGroup.adminView.title" class="h1-text"></h1>
    </div>
    <jhi-button
      [label]="'researchGroup.adminView.createButton'"
      icon="plus"
      severity="primary"
      (click)="onCreateResearchGroup()"
      [shouldTranslate]="true"
    />
  </div>
  <div class="body">
    <jhi-search-filter-sort-bar
      [searchText]="'researchGroup.adminView.searchFilterSortBar.searchText' | translate"
      [totalRecords]="totalRecords()"
      [singleEntity]="'researchGroup.adminView.group' | translate"
      [multipleEntities]="'researchGroup.adminView.groups' | translate"
      [filters]="filters"
      (searchOutput)="onSearchEmit($event)"
      (filterOutput)="onFilterEmit($event)"
      (sortOutput)="loadOnSortEmit($event)"
      [sortableFields]="sortableFields"
    />

    <div class="table-wrapper">
      <jhi-dynamic-table
        [columns]="columns()"
        [data]="researchGroups()"
        [totalRecords]="totalRecords()"
        [page]="page()"
        [rows]="pageSize()"
        (lazyLoad)="loadOnTableEmit($event)"
      />
    </div>

    <ng-template #actionTemplate let-researchGroup>
      <div class="flex space-x-2">
        <jhi-button
          icon="eye"
          ariaLabel="button.view"
          tooltip="button.view"
          severity="primary"
          variant="text"
          (click)="onViewResearchGroup(researchGroup.id)"
        />
        <jhi-button
          icon="ellipsis-vertical"
          [tooltip]="getMenuItems()(researchGroup).length > 0 ? 'button.actions' : 'button.noFurtherActions'"
          severity="primary"
          variant="text"
          (click)="menu.toggle($event)"
          [disabled]="getMenuItems()(researchGroup).length === 0"
        />
        <jhi-menu #menu [items]="getMenuItems()(researchGroup)" [shouldTranslate]="true" />
      </div>
    </ng-template>

    <ng-template #stateTemplate let-researchGroup>
      <jhi-tag
        [text]="stateTextMap()[researchGroup.status] || 'researchGroup.adminView.groupState.unknown'"
        [color]="stateSeverityMap()[researchGroup.status] || 'info'"
        width="8rem"
      />
    </ng-template>
  </div>
</div>
