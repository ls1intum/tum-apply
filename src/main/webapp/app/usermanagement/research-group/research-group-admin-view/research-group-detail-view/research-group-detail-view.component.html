<div class="page-container">
  <div class="header-container">
    <div class="page-header">
      <div class="flex items-center gap-2">
        <jhi-back-button />
        <h1 jhiTranslate="researchGroup.detailView.title"></h1>
      </div>
    </div>
    <jhi-button [label]="'button.save'" icon="save" [shouldTranslate]="true" [disabled]="!form.valid || isSaving()" (click)="onSave()" />
  </div>

  <div>
    <div>
      @if (!isLoading()) {
        <form [formGroup]="form">
          <div>
            <!-- Information Notice -->
            <div class="mt-2 mb-4">
              <jhi-info-box severity="info" message="researchGroup.detailView.infoMessage" [shouldTranslate]="true" />
            </div>

            <!-- Basic information section -->
            <p-divider layout="horizontal">
              <span jhiTranslate="researchGroup.detailView.generalSection"></span>
            </p-divider>

            <div class="form-row">
              <div class="form-field">
                <jhi-string-input
                  [id]="'rg-name'"
                  label="researchGroup.detailView.name"
                  [required]="true"
                  [control]="form.controls.name"
                  [model]="form.controls.name.value || ''"
                  placeholder="researchGroup.detailView.placeholders.name"
                />
              </div>
              <div class="form-field">
                <jhi-string-input
                  [id]="'rg-abbreviation'"
                  label="researchGroup.detailView.abbreviation"
                  [control]="form.controls.abbreviation"
                  [model]="form.controls.abbreviation.value || ''"
                  placeholder="researchGroup.detailView.placeholders.abbreviation"
                />
              </div>
            </div>

            <div class="form-row">
              <div class="form-field">
                <jhi-string-input
                  [id]="'rg-head'"
                  label="researchGroup.detailView.head"
                  [required]="true"
                  [control]="form.controls.head"
                  [model]="form.controls.head.value || ''"
                  placeholder="researchGroup.detailView.placeholders.head"
                />
              </div>
              <div class="form-field"></div>
            </div>

            <!-- School and website section -->
            <p-divider layout="horizontal">
              <span jhiTranslate="researchGroup.detailView.descriptionSection"></span>
            </p-divider>

            <div class="form-row">
              <div class="form-field">
                <jhi-string-input
                  [id]="'rg-website'"
                  label="researchGroup.detailView.website"
                  [control]="form.controls.website"
                  [model]="form.controls.website.value || ''"
                  placeholder="researchGroup.detailView.placeholders.website"
                />
              </div>

              <div class="form-field">
                <jhi-string-input
                  [id]="'rg-email'"
                  label="researchGroup.detailView.email"
                  [control]="form.controls.email"
                  [model]="form.controls.email.value || ''"
                  placeholder="researchGroup.detailView.placeholders.email"
                />
              </div>
            </div>

            <div class="form-row">
              <div class="form-field">
                <jhi-select
                  label="researchGroup.detailView.department"
                  placeholder="researchGroup.detailView.placeholders.department"
                  [items]="departmentOptions()"
                  [required]="true"
                  [selected]="selectedDepartmentOption()"
                  (selectedChange)="onDepartmentChange($event)"
                />
              </div>
              <div class="form-field"></div>
            </div>

            <!-- Address section -->
            <p-divider layout="horizontal">
              <span jhiTranslate="researchGroup.detailView.addressSection"></span>
            </p-divider>

            <div class="form-row">
              <div class="form-field">
                <jhi-string-input
                  [id]="'rg-city'"
                  label="researchGroup.detailView.city"
                  [control]="form.controls.city"
                  [model]="form.controls.city.value || ''"
                  placeholder="researchGroup.detailView.placeholders.city"
                />
              </div>
              <div class="form-field">
                <jhi-string-input
                  [id]="'rg-postalCode'"
                  label="researchGroup.detailView.postalCode"
                  [control]="form.controls.postalCode"
                  [model]="form.controls.postalCode.value || ''"
                  placeholder="researchGroup.detailView.placeholders.postalCode"
                />
              </div>
            </div>

            <div class="form-row mb-6">
              <div class="form-field">
                <jhi-string-input
                  [id]="'rg-street'"
                  label="researchGroup.detailView.street"
                  [control]="form.controls.street"
                  [model]="form.controls.street.value || ''"
                  placeholder="researchGroup.detailView.placeholders.street"
                />
              </div>
              <div class="form-field"></div>
            </div>

            <jhi-editor
              [id]="'rg-description'"
              [characterLimit]="1000"
              label="researchGroup.detailView.description"
              [control]="form.controls.description"
              placeholder="researchGroup.detailView.placeholders.description"
              [shouldTranslate]="true"
            />
          </div>
        </form>
      }
    </div>
  </div>
</div>
