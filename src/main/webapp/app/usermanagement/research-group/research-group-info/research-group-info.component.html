<div class="page-container">
  <div class="header-container">
    <div class="page-header">
      <h1>
        <span jhiTranslate="sidebar.researchgroup.title"></span>
        -
        <span jhiTranslate="researchGroup.groupInfoHeader"></span>
      </h1>
    </div>
  </div>
  <div class="card">
    <p jhiTranslate="researchGroup.groupInfo.description"></p>
    <p class="mb-4 text-xs text-text-secondary" jhiTranslate="global.input.requiredHint"></p>
    <div class="card-body">
      <div class="space-y-4">
        <form [formGroup]="form">
          <div class="form-group">
            <!-- Basic information section -->
            <p-divider layout="horizontal">
              <span jhiTranslate="researchGroup.groupInfo.fields.section1"></span>
            </p-divider>

            <div class="form-row">
              <div class="form-field">
                <jhi-string-input
                  [id]="'rg-name'"
                  label="researchGroup.groupInfo.fields.name"
                  [required]="true"
                  [control]="form.controls.name"
                  [model]="form.controls.name.value || ''"
                  placeholder="researchGroup.groupInfo.placeholders.name"
                />
              </div>
              <div class="form-field">
                <jhi-string-input
                  [id]="'rg-abbreviation'"
                  label="researchGroup.groupInfo.fields.abbreviation"
                  [control]="form.controls.abbreviation"
                  [model]="form.controls.abbreviation.value || ''"
                  placeholder="researchGroup.groupInfo.placeholders.abbreviation"
                />
              </div>
            </div>

            <div class="form-row">
              <div class="form-field">
                <jhi-string-input
                  [id]="'rg-head'"
                  label="researchGroup.groupInfo.fields.head"
                  [required]="true"
                  [control]="form.controls.head"
                  [model]="form.controls.head.value || ''"
                  placeholder="researchGroup.groupInfo.placeholders.head"
                />
              </div>
              <div class="form-field"></div>
            </div>

            <!-- Contact and website section -->
            <p-divider layout="horizontal">
              <span jhiTranslate="researchGroup.groupInfo.fields.section2"></span>
            </p-divider>

            <div class="form-row">
              <div class="form-field">
                <jhi-string-input
                  [id]="'rg-website'"
                  label="researchGroup.groupInfo.fields.website"
                  [control]="form.controls.website"
                  [model]="form.controls.website.value || ''"
                  placeholder="researchGroup.groupInfo.placeholders.website"
                />
              </div>
              <div class="form-field">
                <jhi-string-input
                  [id]="'rg-email'"
                  label="researchGroup.groupInfo.fields.email"
                  [control]="form.controls.email"
                  [model]="form.controls.email.value || ''"
                  placeholder="researchGroup.groupInfo.placeholders.email"
                />
              </div>
            </div>

            <!-- Address section -->
            <p-divider layout="horizontal">
              <span jhiTranslate="researchGroup.groupInfo.fields.section3"></span>
            </p-divider>

            <div class="form-row">
              <div class="form-field">
                <jhi-string-input
                  [id]="'rg-city'"
                  label="researchGroup.groupInfo.fields.city"
                  [control]="form.controls.city"
                  [model]="form.controls.city.value || ''"
                  placeholder="researchGroup.groupInfo.placeholders.city"
                />
              </div>
              <div class="form-field">
                <jhi-string-input
                  [id]="'rg-postalCode'"
                  label="researchGroup.groupInfo.fields.postalCode"
                  [control]="form.controls.postalCode"
                  [model]="form.controls.postalCode.value || ''"
                  placeholder="researchGroup.groupInfo.placeholders.postalCode"
                />
              </div>
            </div>

            <div class="form-row mb-6">
              <div class="form-field">
                <jhi-string-input
                  [id]="'rg-address'"
                  label="researchGroup.groupInfo.fields.address"
                  [control]="form.controls.address"
                  [model]="form.controls.address.value || ''"
                  placeholder="researchGroup.groupInfo.placeholders.address"
                />
              </div>
              <div class="form-field"></div>
            </div>
          </div>

          @if (hasInitialized()) {
            <label class="block mb-2" [for]="'rg-description'">{{ 'researchGroup.groupInfo.fields.description' | translate }}</label>
            <jhi-editor
              [id]="'rg-description'"
              [characterLimit]="1000"
              [control]="form.controls.description"
              placeholder="researchGroup.groupInfo.placeholders.description"
              [shouldTranslate]="true"
            />
          }

          <!-- Organization section -->
          <p-divider layout="horizontal">
            <span jhiTranslate="researchGroup.groupInfo.fields.sectionOrganization"></span>
          </p-divider>

          <jhi-info-box severity="info" message="researchGroup.groupInfo.organizationInfo" [shouldTranslate]="true" />

          <div class="form-row mt-4">
            <div class="form-field">
              <jhi-string-input
                [id]="'rg-department'"
                label="researchGroup.groupInfo.fields.department"
                [model]="departmentName() || ('researchGroup.groupInfo.noDepartment' | translate)"
                [disabled]="true"
              />
            </div>
            <div class="form-field">
              <jhi-string-input
                [id]="'rg-school'"
                label="researchGroup.groupInfo.fields.school"
                [model]="schoolName() || ('researchGroup.groupInfo.noSchool' | translate)"
                [disabled]="true"
              />
            </div>
          </div>
        </form>
      </div>
    </div>
  </div>

  <ng-template #savingBadgeTemplate>
    <jhi-saving-badge [state]="savingState()" />
  </ng-template>
  <jhi-sticky-footer-shell [statusTemplate]="savingBadgeTemplate" />
</div>
