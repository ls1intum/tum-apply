<div class="page-container flex flex-col">
  <div class="header-container">
    <div class="page-header">
      <div class="flex items-center gap-2">
        <jhi-back-button />
        <h1>
          <span jhiTranslate="sidebar.researchgroup.title"></span>
          -
          <span jhiTranslate="researchGroup.emailTemplatesHeader"></span>
        </h1>
      </div>
    </div>
    <jhi-saving-badge [state]="autoSave.state()" />
  </div>
  <div class="w-full flex flex-row gap-8 mb-4">
    <jhi-select
      class="w-full max-w-md"
      label="researchGroup.emailTemplates.sendWhen"
      placeholder="researchGroup.emailTemplates.selectSendWhen"
      [items]="selectOptions()"
      [translateItems]="true"
      [selected]="preselectedEmailType()"
      [required]="true"
      (selectedChange)="setSelectedEmailType($event)"
    />
  </div>

  <p-tabs value="0" class="basic-tabs">
    <p-tablist class="mb-4">
      <p-tab value="0" class="basic-tab" jhiTranslate="researchGroup.emailTemplates.english" />
      <p-tab value="1" class="basic-tab" jhiTranslate="researchGroup.emailTemplates.german" />
    </p-tablist>

    <p-tabpanel value="0" class="px-4 flex flex-col gap-12">
      <div>
        <span class="block text-text-primary font-medium mb-2" jhiTranslate="researchGroup.emailTemplates.subject"></span>
        <div class="flex flex-row items-center gap-4 w-full">
          <span class="whitespace-nowrap">{{ siteName() }} -</span>
          <jhi-string-input
            class="w-full"
            placeholder="researchGroup.emailTemplates.addSubject"
            [model]="english().subject"
            [errorEnabled]="false"
            (modelChange)="updateEnglishSubject($event)"
          />
        </div>
      </div>

      <div>
        <span class="block text-text-primary font-medium mb-2" jhiTranslate="researchGroup.emailTemplates.message"></span>
        <!-- TODO: adapt to jhi-editor when preset input is enabled -->
        <quill-editor
          class="custom-quill-editor"
          [modules]="modules"
          [(ngModel)]="english().body"
          (ngModelChange)="updateEnglishBody($event)"
        />
        <p jhiTranslate="researchGroup.emailTemplates.addVariable"></p>
      </div>
    </p-tabpanel>

    <p-tabpanel value="1" class="px-4 flex flex-col gap-12">
      <div>
        <span class="block text-text-primary font-medium mb-2" jhiTranslate="researchGroup.emailTemplates.subject"></span>
        <div class="flex flex-row items-center gap-4 w-full">
          <span class="whitespace-nowrap">{{ siteName() }} -</span>
          <jhi-string-input
            class="w-full"
            placeholder="researchGroup.emailTemplates.addSubject"
            [model]="german().subject"
            [errorEnabled]="false"
            (modelChange)="updateGermanSubject($event)"
          />
        </div>
      </div>

      <div>
        <span class="block text-text-primary font-medium mb-2" jhiTranslate="researchGroup.emailTemplates.message"></span>
        <!-- TODO: adapt to jhi-editor when preset input is enabled -->
        <quill-editor
          class="custom-quill-editor"
          [modules]="modules"
          [(ngModel)]="german().body"
          (ngModelChange)="updateGermanBody($event)"
        />
        <p jhiTranslate="researchGroup.emailTemplates.addVariable"></p>
      </div>
    </p-tabpanel>
  </p-tabs>
</div>
