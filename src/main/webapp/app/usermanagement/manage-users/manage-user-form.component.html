<div class="page-container">
  <jhi-confirm-dialog
    label="button.delete"
    [header]="translationKey + '.confirmDialog.deleteHeader'"
    [message]="translationKey + '.confirmDialog.deleteMessage'"
    severity="danger"
    confirmIcon="trash"
    [showOpenButton]="false"
    [visible]="showDeleteDialog()"
    (confirmed)="onConfirmDelete()"
    (closed)="showDeleteDialog.set(false)"
  />

  <div class="header-container">
    <div class="page-header">
      <div class="flex items-center gap-2">
        <jhi-back-button />
        <h1 [jhiTranslate]="title()"></h1>
      </div>
    </div>
    @if (mode() === 'edit') {
      <jhi-button
        [label]="translationKey + '.form.buttons.delete'"
        icon="trash"
        severity="danger"
        variant="outlined"
        (click)="onRequestDelete()"
        [shouldTranslate]="true"
      />
    }
  </div>

  <form [formGroup]="form" (ngSubmit)="onSubmit()">
    @if (mode() === 'import') {
      <p-divider layout="horizontal">
        <span [jhiTranslate]="translationKey + '.form.identitySection'"></span>
      </p-divider>
      <div class="form-row">
        <div class="form-field">
          <jhi-string-input
            class="w-full inline-block mr-4"
            [label]="translationKey + '.form.fields.keycloakUserId'"
            id="keycloakUserId"
            [control]="form.controls.keycloakUserId"
            [shouldTranslate]="true"
            [required]="true"
          />
        </div>
        <div class="form-field"></div>
      </div>
    } @else {
      <p-divider layout="horizontal">
        <span [jhiTranslate]="translationKey + '.form.identitySection'"></span>
      </p-divider>
      <div class="form-row">
        <div class="form-field">
          <jhi-string-input
            class="w-full inline-block mr-4"
            [label]="translationKey + '.form.fields.firstName'"
            id="firstName"
            [control]="form.controls.firstName"
            [shouldTranslate]="true"
            [required]="true"
          />
        </div>
        <div class="form-field">
          <jhi-string-input
            class="w-full inline-block mr-4"
            [label]="translationKey + '.form.fields.lastName'"
            id="lastName"
            [control]="form.controls.lastName"
            [shouldTranslate]="true"
            [required]="true"
          />
        </div>
      </div>

      <div class="form-row">
        <div class="form-field">
          <jhi-string-input
            class="w-full inline-block mr-4"
            [label]="translationKey + '.form.fields.email'"
            id="email"
            [control]="form.controls.email"
            [disabled]="mode() === 'edit'"
            [shouldTranslate]="true"
            [required]="true"
          />
        </div>
        <div class="form-field">
          <jhi-string-input
            class="w-full inline-block mr-4"
            [label]="translationKey + '.form.fields.universityId'"
            id="universityId"
            [control]="form.controls.universityId"
            [shouldTranslate]="true"
          />
        </div>
      </div>

      @if (mode() === 'create') {
        <div class="form-row">
          <div class="form-field">
            <jhi-string-input
              class="w-full inline-block mr-4"
              [label]="translationKey + '.form.fields.password'"
              id="password"
              [control]="form.controls.password"
              [shouldTranslate]="true"
              [required]="true"
              [helperTextLeft]="translationKey + '.form.passwordRequirements'"
            />
          </div>
          <div class="form-field"></div>
        </div>
      }

      <p-divider layout="horizontal">
        <span [jhiTranslate]="translationKey + '.form.profileSection'"></span>
      </p-divider>

      <div class="form-row">
        <div class="form-field">
          <jhi-string-input
            class="w-full inline-block mr-4"
            [label]="translationKey + '.form.fields.phoneNumber'"
            id="phoneNumber"
            [control]="form.controls.phoneNumber"
            [shouldTranslate]="true"
          />
        </div>
        <div class="form-field">
          <jhi-datepicker
            [label]="translationKey + '.form.fields.birthday'"
            width="100%"
            [selectedDate]="birthday()"
            (selectedDateChange)="updateBirthday($event)"
            [minDate]="minBirthday"
            [maxDate]="maxBirthday"
            [defaultDate]="defaultBirthday"
            [shouldTranslate]="true"
          />
        </div>
      </div>

      <div class="form-row">
        <div class="form-field">
          <jhi-select
            width="100%"
            [label]="translationKey + '.form.fields.gender'"
            [items]="genderOptions"
            [selected]="selectedGender()"
            (selectedChange)="updateGender($event)"
            [showClear]="true"
            [translateItems]="true"
          />
        </div>
        <div class="form-field">
          <jhi-select
            width="100%"
            [label]="translationKey + '.form.fields.nationality'"
            [items]="nationalityOptionsBase"
            [selected]="selectedNationality()"
            (selectedChange)="updateNationality($event)"
            [filter]="true"
            [showClear]="true"
            [translateItems]="true"
            [dataKey]="'value'"
          />
        </div>
      </div>

      <div class="form-row">
        <div class="form-field">
          <jhi-string-input
            class="w-full inline-block mr-4"
            [label]="translationKey + '.form.fields.website'"
            id="website"
            [control]="form.controls.website"
            [shouldTranslate]="true"
          />
        </div>
        <div class="form-field">
          <jhi-string-input
            class="w-full inline-block mr-4"
            [label]="translationKey + '.form.fields.linkedinUrl'"
            id="linkedinUrl"
            [control]="form.controls.linkedinUrl"
            [shouldTranslate]="true"
          />
        </div>
      </div>

      <div class="form-row">
        <div class="form-field">
          <jhi-select
            width="100%"
            [label]="translationKey + '.form.fields.selectedLanguage'"
            [items]="languageOptions"
            [selected]="selectedLanguage()"
            (selectedChange)="updateLanguage($event)"
            [showClear]="true"
            [translateItems]="true"
          />
        </div>
        <div class="form-field"></div>
      </div>

      @if (mode() === 'edit' && loadedUser(); as user) {
        <p-divider layout="horizontal">
          <span [jhiTranslate]="translationKey + '.form.statusSection'"></span>
        </p-divider>

        <div class="form-row">
          <div class="form-field">
            <span class="custom-label">
              <span [jhiTranslate]="translationKey + '.form.fields.userId'"></span>
            </span>
            <div class="text-sm text-text-secondary break-all">{{ user.userId }}</div>
          </div>
          <div class="form-field">
            <span class="custom-label">
              <span [jhiTranslate]="translationKey + '.form.fields.createdAt'"></span>
            </span>
            <div class="text-sm text-text-secondary">{{ user.createdAt | localizedDate }}</div>
          </div>
        </div>

        <div class="form-row">
          <div class="form-field">
            <span class="custom-label">
              <span [jhiTranslate]="translationKey + '.form.fields.lastActivityAt'"></span>
            </span>
            <div class="text-sm text-text-secondary">{{ user.lastActivityAt | localizedDate }}</div>
          </div>
          <div class="form-field">
            <span class="custom-label">
              <span [jhiTranslate]="translationKey + '.form.fields.aiFeaturesEnabled'"></span>
            </span>
            <div class="text-sm text-text-secondary">{{ user.aiFeaturesEnabled ? '✓' : '–' }}</div>
          </div>
        </div>
      }
    }

    <div class="flex justify-end gap-2 mt-6">
      <jhi-button
        type="submit"
        [label]="submitLabel()"
        icon="check"
        severity="primary"
        [disabled]="isSubmitting() || form.invalid"
        [shouldTranslate]="true"
      />
    </div>
  </form>
</div>
