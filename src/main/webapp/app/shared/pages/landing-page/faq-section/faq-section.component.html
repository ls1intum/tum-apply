<div class="flex flex-col items-center justify-center gap-5 self-stretch max-w-[90%] mx-auto py-12 px-3 sm:py-24 sm:px-12">
  <h2 class="text-[2rem] font-bold" jhiTranslate="landingPage.faq.headline"></h2>
  <p class="text-xl font-semibold" jhiTranslate="landingPage.faq.subheadline"></p>
  <div class="flex items-center gap-2">
    <a href="https://ls1intum.github.io/doc-apply" target="_blank">
      <span jhiTranslate="landingPage.faq.sub-subheadline"></span>
      <fa-icon class="external-icon" size="xs" [icon]="faArrowUpRightFromSquare" />
    </a>
  </div>
  <p-accordion class="flex flex-col gap-3 w-full max-w-3xl" [value]="0">
    @for (tab of tabs; track tab.value) {
      <p-accordion-panel class="border border-border-default rounded-xl overflow-hidden" [value]="tab.value">
        <p-accordion-header class="font-semibold wrap-anywhere [&_.p-accordionheader-toggle-icon]:shrink-0">
          {{ tab.title | translate }}
        </p-accordion-header>
        <p-accordion-content>
          <div class="pt-2 leading-relaxed" [innerHTML]="tab.content | translate"></div>
        </p-accordion-content>
      </p-accordion-panel>
    }
  </p-accordion>
</div>
