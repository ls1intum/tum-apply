<div
  class="flex flex-col items-center justify-center self-stretch py-[3.25rem] gap-[3.25rem] bg-background-special max-lg:py-10 max-lg:px-8 max-lg:gap-10 max-md:py-8 max-md:px-4 max-md:gap-8"
>
  <h2
    class="text-center text-[2rem] font-bold max-lg:text-[1.75rem] max-md:text-[1.5rem]"
    jhiTranslate="landingPage.voices.headline"
  ></h2>
  <div
    class="flex flex-wrap justify-center items-center self-stretch px-20 gap-8 max-lg:px-8 max-lg:gap-8 max-md:flex-col max-md:px-0 max-md:gap-6"
  >
    @for (voice of voices; track voice) {
      <jhi-voice-card
        [name]="voice.name | translate"
        [field]="voice.field | translate"
        [quote]="voice.quote | translate"
        [imageSrc]="voice.imageSrc"
      />
    }
  </div>
</div>
