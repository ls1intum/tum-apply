<div
  class="flex flex-col items-start gap-10 px-25 py-12 max-lg:items-center max-lg:p-8 max-lg:gap-8 max-md:p-6 max-md:gap-8 max-md:min-w-0"
>
  <h2
    class="mx-auto text-center text-4xl font-bold max-lg:text-[2rem] max-md:text-[1.75rem]"
    jhiTranslate="landingPage.informationSection.headline"
  ></h2>
  <div
    class="grid grid-cols-3 mx-auto max-w-full gap-8 justify-center max-lg:grid-cols-[repeat(auto-fit,minmax(13rem,1fr))] max-lg:gap-7 max-lg:w-full max-md:grid-cols-[repeat(auto-fit,minmax(12rem,1fr))] max-md:gap-6 max-md:w-full"
  >
    @for (card of cards; track card) {
      <jhi-information-card [imageSrc]="card.imageSrc" [text]="card.text | translate" [link]="card.link" />
    }
  </div>
</div>
