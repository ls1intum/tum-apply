<a [href]="link()" class="flex flex-col justify-center items-center" rel="noopener noreferrer" target="_blank">
  <img [src]="imageSrc()" class="w-40 md:w-48 lg:w-60 aspect-square" alt="" />
  <div class="md:text-xl lg:text-2xl">
    {{ text() }}
    <fa-icon class="external-icon" size="xs" [icon]="faArrowUpRightFromSquare" />
  </div>
</a>
