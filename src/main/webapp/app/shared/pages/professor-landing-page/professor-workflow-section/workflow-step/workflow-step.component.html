<div class="flex flex-col items-center justify-start gap-[0.4rem] text-center p-4 max-w-[25rem] w-full pointer-events-none">
  <div class="[&_button]:!rounded-full">
    <jhi-button [icon]="icon()" severity="contrast" class="pointer-events-none" />
  </div>
  <h3 class="text-2xl font-semibold line-clamp-2 leading-[1.2] min-h-[3.6rem] pt-4">{{ title() }}</h3>
  <p class="text-center leading-[1.4] [overflow-wrap:anywhere] [hyphens:auto]">{{ description() }}</p>
</div>
