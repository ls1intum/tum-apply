<div
  class="flex flex-col items-center justify-center self-stretch py-16 gap-12 bg-background-surface max-lg:py-12 max-lg:px-8 max-lg:gap-10 max-md:py-8 max-md:px-4 max-md:gap-8"
>
  <h2
    class="text-center text-4xl font-bold max-lg:text-[2rem] max-md:text-[1.75rem]"
    jhiTranslate="professorLandingPage.workflow.headline"
  ></h2>
  <div class="flex flex-col items-center max-md:gap-6">
    <div
      class="flex justify-center gap-10 max-lg:flex-wrap max-lg:px-6 max-lg:gap-8 max-md:flex-col max-md:px-0 max-md:gap-4 max-md:w-full"
    >
      @for (step of steps; track step.title) {
        <jhi-workflow-step [icon]="step.icon" [title]="step.title | translate" [description]="step.description | translate" />
      }
    </div>
  </div>
</div>
