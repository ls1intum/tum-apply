<p-toggleSwitch
  [ngModel]="model()"
  (ngModelChange)="onChange($event)"
  [disabled]="disabled()"
  [class]="toggleClass()"
  [ngModelOptions]="{ standalone: true }"
>
  <ng-template #handle let-checked="checked">
    <fa-icon
      class="jhi-toggle-switch__icon flex items-center justify-center text-[0.84rem] leading-none [&>svg]:block [&>svg]:stroke-current [&>svg]:stroke-[15.0]"
      [class.text-positive-strong]="checked"
      [class.text-negative-strong]="!checked"
      [icon]="checked ? enabledIcon : disabledIcon"
    />
  </ng-template>
</p-toggleSwitch>
