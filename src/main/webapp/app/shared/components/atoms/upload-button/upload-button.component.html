<p-fileupload
  [customUpload]="true"
  [multiple]="allowMultiple()"
  accept="application/pdf"
  mode="advanced"
  (onClear)="onClear()"
  (onSelect)="onFileSelected($event)"
  #fileupload_component
>
  <ng-template #header let-chooseCallback="chooseCallback" let-uploadCallback="uploadCallback" let-clearCallback="clearCallback">
    <div class="flex flex-wrap flex-row justify-around gap-2.5 w-full" (click)="fileupload_component.choose()">
    </div>
  </ng-template>
  <ng-template #empty>
    <div class="flex justify-center flex-col gap-0.5 cursor-pointer" (click)="fileupload_component.choose()">
      <div class="flex w-full justify-center">
        <span class="flex border items-center justify-center rounded-pill border-primary size-20">
          <fa-icon [icon]="['fas', 'cloud-arrow-up']" class="background-primary" size="xl" />
        </span>
      </div>
      <p class="mt-0 text-sm text-color text-center" jhiTranslate="entity.upload.instruction"></p>
      <p class="mt-0 mb-0 text-xs text-color text-center"><span jhiTranslate="entity.upload.max_size"></span> {{ maxUploadSizeInMb }}MB</p>
    </div>
  </ng-template>
  <ng-template #content let-files let-removeFileCallback="removeFileCallback">
    <div class="mt-0 w-full">
      <table class="table-fixed border-collapse w-full slim-table">
        <thead>
          <tr>
            <th class="w-1/10"></th>
            <th></th>
            <th class="w-3/20"></th>
            <th class="w-1/10"></th>
          </tr>
        </thead>
        <tbody>
          @if (selectedFiles(); as selectedFiles) {
            @for (file of selectedFiles; track $index) {
              <tr class="leading-normal hover:bg-background-surface transition-colors">
                <td class="py-1">
                  <span class="w-full h-full inline-flex justify-center">
                    <fa-icon
                      icon="cloud-arrow-up"
                      class="icon-color-warning"
                      [pTooltip]="'entity.upload.tooltip.to_upload' | translate"
                      tooltipPosition="top"
                    />
                  </span>
                </td>
                <td class="py-1 pr-4">
                  <span class="w-full h-full inline-flex items-center">
                    <input
                      [(ngModel)]="file.name"
                      class="w-full bg-transparent border-0 border-b border-dashed border-neutral-color hover:border-solid hover:border-neutral-hover-color focus:border-solid focus:border-primary-color focus:ring-0 px-1 py-1 outline-none transition-all text-color"                    />
                  </span>
                </td>
                <td class="text-center py-1">
                  <small class="text-muted">{{ formatSize(file.size) }}</small>
                </td>
                <td class="py-1 text-center">
                  <jhi-button
                    icon="times"
                    severity="danger"
                    variant="text"
                    (click)="removeFileCallback($event, $index)"
                    aria-label="Remove file"
                  />
                </td>
              </tr>
            }
          }
          @if (documentIds(); as documentIds) {
            @for (info of documentIds; track $index) {
              <tr class="leading-normal hover:bg-background-surface transition-colors">
                <td class="py-1">
                  <span class="w-full h-full inline-flex justify-center">
                    <fa-icon
                      icon="file-circle-check"
                      class="icon-color-success"
                      [pTooltip]="'entity.upload.tooltip.already_uploaded' | translate"
                      tooltipPosition="top"
                    />
                  </span>
                </td>
                <td class="py-1 pr-4">
                  <input
                    [(ngModel)]="info.name"
                    (blur)="renameDocument(info)"
                    class="w-full bg-transparent border-0 border-b border-dashed border-neutral-color hover:border-solid hover:border-neutral-hover-color focus:border-solid focus:border-primary-color focus:ring-0 px-1 py-1 outline-none transition-all text-color"                  />
                </td>
                <td class="text-center">
                  <small class="text-muted">{{ formatSize(info.size) }}</small>
                </td>
                <td class="py-1 text-center">
                  <jhi-confirm-dialog
                    [label]="'button.delete' | translate"
                    [header]="'entity.upload.deleteDocument.confirm.header' | translate"
                    [message]="'entity.upload.deleteDocument.confirm.message' | translate"
                    [severity]="'danger'"
                    confirmIcon="trash"
                    [iconOnly]="true"
                    [tooltip]="'button.delete' | translate"
                    size="sm"
                    (confirmed)="deleteDictionary(info)"
                  />
                </td>
              </tr>
            }
          }
        </tbody>
      </table>
    </div>
  </ng-template>
  <ng-template #file />
</p-fileupload>

<jhi-confirm-dialog
  [header]="'entity.upload.duplicate.title' | translate"
  [message]="'entity.upload.duplicate.message' | translate: { filename: duplicateFileName() }"
  [label]="'button.replace' | translate"
  severity="primary"
  [showOpenButton]="false"
  [visible]="showDuplicateDialog()"
  (confirmed)="onConfirmDuplicate()"
  (closed)="showDuplicateDialog.set(false)"
/>

<jhi-confirm-dialog
  [header]="'entity.upload.replacement.title' | translate"
  [message]="'entity.upload.replacement.message' | translate"
  [label]="'button.replace' | translate"
  severity="primary"
  [showOpenButton]="false"
  [visible]="showReplacementDialog()"
  (confirmed)="onConfirmReplacement()"
  (closed)="showReplacementDialog.set(false)"
/>
