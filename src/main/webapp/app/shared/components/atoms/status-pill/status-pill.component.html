<button
  class="flex w-full items-center gap-2 rounded-lg px-3 py-3 text-xs font-medium border border-border-default transition-colors text-left"
  [class.bg-background-surface]="isActive()"
  [class.hover:bg-background-surface]="count() > 0 && !isActive()"
  [class.opacity-40]="count() === 0 && !loading()"
  [class.cursor-default]="count() === 0 && !loading()"
  [class.cursor-pointer]="count() > 0"
  (click)="count() > 0 && selected.emit()"
>
  <span class="w-2 h-2 rounded-full shrink-0" [class]="dotColor()"></span>

  <span [class.text-text-tertiary]="count() === 0 && !loading()" [class.text-text-secondary]="count() > 0 || loading()">
    <span [jhiTranslate]="labelKey()"></span>
  </span>

  <span class="ml-auto flex items-center">
    @if (loading()) {
      <jhi-progress-spinner class="w-3 h-3" strokeWidth="4" />
    } @else if (count() > 0) {
      <span class="text-text-tertiary">{{ count() }}</span>
    } @else {
      <fa-icon [icon]="['fas', 'check']" class="ml-auto text-positive-default opacity-60 text-[10px]" />
    }
  </span>
</button>
