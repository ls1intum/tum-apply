<div class="flex flex-col relative">
  <label class="mb-1 mr-4 text-text-primary" [for]="resolvedInputId()">
    @if (label() !== undefined) {
      @if (shouldTranslate()) {
        <span jhiTranslate="{{ label() }}"></span>
      } @else {
        {{ label() }}
      }
    }
    @if (required()) {
      <span class="required">*</span>
    }
    @if (icon(); as icon) {
      @if (icon === 'circle-info' && tooltipText()) {
        <fa-icon class="text-primary-default" [icon]="['fas', icon]" [pTooltip]="displayTooltipText() ?? ''" tooltipPosition="top" />
      } @else {
        <fa-icon [icon]="['fas', icon]" />
      }
    }
  </label>
  <p-datepicker
    (ngModelChange)="onDateChange($event)"
    (onHide)="isCalendarOpen.set(false)"
    (onShow)="isCalendarOpen.set(true)"
    [(ngModel)]="modelDate"
    [placeholder]="displayPlaceholder()"
    [disabled]="disabled()"
    [minDate]="effectiveMinDate()"
    [maxDate]="maxDate()"
    [defaultDate]="defaultDate()"
    [showButtonBar]="true"
    [style]="{ width: width() }"
    class="{{ datepickerClass }}"
    [dateFormat]="dateFormat()"
    iconDisplay="button"
    [inputId]="resolvedInputId()"
    showIcon="true"
    [inputStyleClass]="inputStyleClass"
    [appendTo]="'body'"
    (input)="onInputTyped($event)"
  >
    <ng-template pTemplate="date" let-date>
      @let highlightedDate = highlightedDateParts();
      @let isHighlighted =
        highlightedDate && highlightedDate.day === date.day && highlightedDate.month === date.month && highlightedDate.year === date.year;
      @let tooltipLabel = highlightedDateLabel();
      <span
        class="inline-flex size-full items-center justify-center"
        [class.datepicker-reference-day]="isHighlighted"
        [class.rounded-full]="isHighlighted"
        [class.font-semibold]="isHighlighted"
        [class.ring-2]="isHighlighted"
        [class.ring-inset]="isHighlighted"
        [class.ring-primary-default]="isHighlighted"
        [pTooltip]="tooltipLabel ? (shouldTranslate() ? (tooltipLabel | translate) : tooltipLabel) : undefined"
        tooltipPosition="top"
        [tooltipDisabled]="!isHighlighted || !tooltipLabel"
      >
        {{ date.day }}
      </span>
    </ng-template>
    <ng-template pTemplate="triggericon">
      <fa-icon [icon]="['fas', 'calendar']" />
    </ng-template>
  </p-datepicker>
  @if (errorEnabled()) {
    <div class="error-text"></div>
  }
</div>
