@if (selectable()) {
  <div class="flex gap-1.5">
    @for (state of buttonStates(); track state.entry.value) {
      <button
        type="button"
        class="px-3 py-1 rounded-full text-sm font-medium transition-colors border focus:outline-none whitespace-nowrap cursor-pointer"
        [style.background-color]="state.bg"
        [style.border-color]="state.borderColor"
        [style.color]="state.textColor"
        (mouseenter)="hoveredIndex.set(state.index)"
        (mouseleave)="hoveredIndex.set(undefined)"
        (click)="onSectionClick(state.index)"
        (keydown.enter)="onSectionClick(state.index)"
      >
        {{ state.label }}
      </button>
    }
  </div>
} @else if (selectedBadge(); as badge) {
  <span
    class="inline-flex items-center px-3 py-1 rounded-full text-sm font-medium text-color-base-white"
    [style.background-color]="badge.color"
    >{{ badge.label }}
  </span>
}
