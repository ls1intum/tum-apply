<div>
  <div class="label-top label-input-wrapper">
    @if (label(); as label) {
      <label class="custom-label" [for]="inputId()">
        {{ displayLabel() }}
        @if (required()) {
          <span class="required">*</span>
        }
        @if (icon(); as icon) {
          @if (icon === 'circle-info' && tooltipText()) {
            <fa-icon class="icon" [icon]="['fas', icon]" [pTooltip]="displayTooltipText()" tooltipPosition="top" />
          } @else {
            <fa-icon class="icon" [icon]="['fas', icon ?? '']" />
          }
        }
      </label>
    }

    <div [class.error]="inputState() === 'invalid'" class="input-wrapper">
      @if (control()) {
        <input
          (blur)="onBlur()"
          (focus)="onFocus()"
          [id]="inputId()"
          [formControl]="formControl()"
          [pAutoFocus]="autofocus()"
          [placeholder]="displayPlaceholder()"
          [required]="required()"
          [style]="{ width: width() }"
          autocomplete="off"
          pInputText
        />
      } @else {
        <input
          (blur)="onBlur()"
          (focus)="onFocus()"
          (ngModelChange)="onInputChange($event)"
          [id]="inputId()"
          [ngModel]="model()"
          [pAutoFocus]="autofocus()"
          [placeholder]="displayPlaceholder()"
          [required]="required()"
          [disabled]="disabled()"
          [style]="{ width: width() }"
          autocomplete="off"
          pInputText
        />
      }
    </div>
    @if (helperTextLeft()) {
      <div class="flex justify-between items-center text-sm gap-2">
        <span class="text-text-disabled flex-1">{{ displayHelperTextLeft() }}</span>

        @if (helperTextRight()) {
          <button
            type="button"
            class="btn-bare text-primary-default underline cursor-pointer flex-shrink-0"
            (click)="helperTextRightClick.emit()"
          >
            {{ displayHelperTextRight() }}
          </button>
        }
      </div>
    }
    @if (warningText()) {
      <div class="text-warning-hover text-sm gap-2">
        {{ displayWarningText() }}
      </div>
    }
    @if (errorEnabled()) {
      <div class="error-text">
        @if (inputState() === 'invalid' && !isFocused()) {
          {{ errorMessage() }}
        }
      </div>
    }
  </div>
</div>
