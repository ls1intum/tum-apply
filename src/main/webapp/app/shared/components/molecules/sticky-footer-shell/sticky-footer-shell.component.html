<div
  class="sticky-footer sticky bottom-0 mt-auto py-2 sm:py-3 bg-background-default transition-all duration-300 z-[1000] ease-in-out -mx-4 px-4 lg:-mx-12 lg:px-12 border-t"
  [class.border-border-default]="!isAtBottom()"
  [class.border-transparent]="isAtBottom()"
>
  <div class="flex flex-col gap-3 transition-opacity duration-200 ease-in-out">
    @if (statusTemplate(); as currentStatusTemplate) {
      <div class="sm:hidden flex justify-end">
        <ng-container [ngTemplateOutlet]="currentStatusTemplate" />
      </div>
    }
    <div class="flex justify-between">
      <div>
        @if (leftTemplate(); as currentLeftTemplate) {
          <ng-container [ngTemplateOutlet]="currentLeftTemplate" />
        }
      </div>
      <div class="flex gap-6">
        @if (statusTemplate(); as currentStatusTemplate) {
          <div class="hidden sm:flex">
            <ng-container [ngTemplateOutlet]="currentStatusTemplate" />
          </div>
        }
        @if (rightTemplate(); as currentRightTemplate) {
          <ng-container [ngTemplateOutlet]="currentRightTemplate" />
        }
      </div>
    </div>
  </div>
</div>
<div #bottomSentinel class="h-px"></div>
