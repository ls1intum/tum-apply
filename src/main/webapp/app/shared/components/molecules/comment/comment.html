<div class="comment">
  <!-- Header -->
  <div class="comment-header">
    <div class="comment-details">
      <span class="comment-author">{{ author() }}</span>
      @if (!isCreate()) {
        <span class="comment-created-at">
          {{ createdAt() | timeAgo }}
        </span>
      }
    </div>

    @if (canEdit() && !isCreate()) {
      <div class="comment-actions">
        <jhi-button variant="text" tooltip="button.edit" icon="pen" (click)="startEdit()" [disabled]="isEdit()" size="sm" />
        <jhi-confirm-dialog
          label="button.delete"
          header="evaluation.deleteComment.confirm.header"
          message="evaluation.deleteComment.confirm.message"
          [severity]="'danger'"
          confirmIcon="trash"
          [iconOnly]="true"
          tooltip="button.delete"
          size="sm"
          (confirmed)="deleted.emit()"
        />
      </div>
    }
  </div>

  <!-- Body -->
  <div class="comment-body">
    @if (isEdit() || isCreate()) {
      <textarea
        rows="3"
        pTextarea
        [placeholder]="placeholderText()"
        [autoResize]="true"
        class="w-full"
        [value]="draft()"
        (input)="onInput($event)"
      ></textarea>
    } @else {
      <div class="comment-text">{{ text() }}</div>
    }
  </div>

  @if (isEdit()) {
    <div class="comment-controls">
      <jhi-button label="button.cancel" variant="text" severity="primary" (click)="onCancel()" />
      <jhi-button label="button.save" severity="primary" (click)="onSave()" [disabled]="!canSave()" />
    </div>
  } @else if (isCreate()) {
    <div class="comment-controls">
      <jhi-button label="button.send" icon="paper-plane" severity="primary" (click)="onSave()" [disabled]="!canSave()" />
    </div>
  }
</div>
