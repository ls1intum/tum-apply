@if (aiFeaturesEnabled()) {
  <div
    class="flex flex-col mb-5 justify-between gap-2 p-4 bg-background-surface rounded-sm border border-border-default md:flex-row md:gap-6 md:items-center"
  >
    <div class="leading-relaxed">
      <p class="text-xs text-text-secondary" [jhiTranslate]="helperTextKey()"></p>
      <p class="text-xs text-text-secondary" jhiTranslate="entity.aiExtraction.checkInfo"></p>
    </div>

    <div class="flex-shrink-0 inline-flex flex-row-reverse justify-end items-center gap-2 md:flex-row md:justify-start">
      <jhi-info-icon
        [clickable]="true"
        ariaLabel="entity.aiExtraction.consentInfo"
        [shouldTranslate]="true"
        (clicked)="aiConsentVisible.set(true)"
      />
      @if (isExtractingAi()) {
        <div class="flex items-center justify-center gap-2 px-4 py-2 rounded-lg border border-border-default">
          <jhi-progress-spinner classStyling="w-4 h-4" strokeWidth="4" />
          <span class="whitespace-nowrap text-sm text-text-secondary" jhiTranslate="entity.aiExtraction.loading"></span>
        </div>
      } @else {
        <jhi-button
          [label]="'entity.aiExtraction.button'"
          [shouldTranslate]="true"
          severity="primary"
          icon="custom-sparkle"
          classStyling="!justify-center !whitespace-nowrap"
          (click)="extractAiData()"
          [disabled]="disabled()"
        />
      }
    </div>
  </div>

  <jhi-ai-consent-modal
    [visible]="aiConsentVisible()"
    [currentRole]="UserShortDTORolesEnum.Applicant"
    [settings]="false"
    (visibleChange)="aiConsentVisible.set($event)"
  />
}
