<p-dialog
  [modal]="true"
  [(visible)]="visible"
  [styleClass]="'w-[56%] max-w-[42rem] p-3 [&_.p-dialog-header]:items-start'"
  [contentStyle]="mode() === 'REJECT' ? { overflow: 'visible' } : undefined"
  [dismissableMask]="true"
  [closeOnEscape]="true"
  [draggable]="false"
>
  <!-- ───────── Header (applicant + job title) ───────── -->
  <ng-template #header class="custom-header">
    <div class="w-full flex flex-col gap-2">
      <div class="flex items-center gap-2 -ml-2.5">
        <jhi-user-avatar
          [fullName]="application()?.applicationDetailDTO?.applicant?.user?.name ?? ''"
          [avatarUrl]="application()?.applicationDetailDTO?.applicant?.user?.avatar"
        />
        <span class="font-bold text-[1.3rem]">{{ application()?.applicationDetailDTO?.applicant?.user?.name ?? '' }}</span>
      </div>
      <div class="flex items-center gap-2 text-text-disabled">
        <fa-icon class="text-primary" [icon]="['fas', 'briefcase']" />
        <span>{{ application()?.applicationDetailDTO?.jobTitle ?? '' }}</span>
      </div>
    </div>
  </ng-template>

  <!-- Swap between ACCEPT and REJECT content -->
  <ng-container [ngTemplateOutlet]="mode() === 'ACCEPT' ? acceptTemplate : rejectTemplate" />

  <ng-template pTemplate="footer">
    <div class="pt-3 flex justify-end gap-2">
      <jhi-button [label]="'button.cancel' | translate" variant="outlined" (click)="this.visible.set(false)" />
      @if (mode() === 'ACCEPT') {
        <jhi-button [label]="'evaluation.accept' | translate" severity="success" [disabled]="!canAccept()" (click)="onAccept()" />
      } @else {
        <jhi-button [label]="'evaluation.reject' | translate" severity="danger" [disabled]="!canReject()" (click)="onReject()" />
      }
    </div>
  </ng-template>
</p-dialog>

<!-- ───────── Template rendered in ACCEPT mode ───────── -->
<ng-template #acceptTemplate>
  <div>
    <!-- TODO: Removed until editor is fixed -->
    <!--
    <jhi-editor
      [label]="'evaluation.message' | translate"
      [placeholder]="'evaluation.writeMessage' | translate"
      [model]="editorModel()"
      (modelChange)="editorModel.set($event)"
      [required]="true"
    />
    -->
    <ul class="list-none mt-6 flex flex-col gap-6">
      <li class="flex items-center gap-2">
        <p-checkbox [(ngModel)]="notifyApplicant" [binary]="true" />
        <label class="text-[0.95rem]" jhiTranslate="evaluation.notifyApplicant">Notify the applicant</label>
      </li>
      <li class="flex items-center gap-2">
        <p-checkbox [(ngModel)]="closeJob" [binary]="true" />
        <label class="text-[0.95rem]" jhiTranslate="evaluation.closeJobAndRejectAll"></label>
      </li>
    </ul>
  </div>
</ng-template>

<!-- ───────── Template rendered in REJECT mode ───────── -->
<ng-template #rejectTemplate>
  <div>
    <jhi-select
      [items]="rejectReasons"
      [label]="'evaluation.reason' | translate"
      [required]="true"
      [selected]="selectedRejectReason()"
      [placeholder]="'evaluation.selectReason' | translate"
      [translateItems]="true"
      (selectedChange)="onSelectChange($event)"
    />
    <ul class="list-none mt-6 flex flex-col gap-6">
      <li class="flex items-center gap-2">
        <p-checkbox [(ngModel)]="notifyApplicant" [binary]="true" />
        <label class="text-[0.95rem]" jhiTranslate="evaluation.notifyApplicant">Notify the applicant</label>
      </li>
    </ul>
  </div>
</ng-template>
