<jhi-dialog
  [header]="'evaluation.details.documentTitle'"
  [draggable]="false"
  [(visible)]="isOpen"
  [appendTo]="'body'"
  [classStyling]="'max-h-[90vh] w-3/5 max-w-[100rem]'"
>
  <div class="flex flex-col md:flex-row gap-6 h-[70vh] max-h-[calc(90vh-8rem)] overflow-hidden">
    <!-- LEFT: List of documents -->
    <div class="min-w-0 overflow-y-auto md:overflow-visible md:max-h-[40vh] md:w-[30%] md:min-w-[12rem] md:h-full md:flex-shrink-0">
      <ul class="divide-y divide-[var(--p-border-default)]">
        @for (item of documentHolders(); track item.document.id) {
          <li class="flex min-w-0 items-center gap-3 px-3 py-2">
            <!-- Checkbox -->
            <!-- Removed until download functionality is added
            <p-checkbox
              [binary]="true"
              [ngModel]="isChecked(item.document.id)()"
              (ngModelChange)="toggleChecked(item.document.id, $event)"
              [inputId]="'doc-chk-' + item.document.id"
              [attr.aria-label]="item.label"
            />
            -->
            <!-- Label container -->
            <button
              type="button"
              class="btn-bare min-w-0 grow cursor-pointer px-3 py-2 rounded-md hover:text-text-on-primary hover:bg-primary-default w-full text-left"
              [class.bg-background-surface-alt]="isSelected(item.document.id)()"
              (click)="selectDoc(item.document.id)"
            >
              @if (item.shouldTranslateLabel) {
                <span class="block truncate" [jhiTranslate]="item.label" [translateValues]="item.labelParams ?? {}"></span>
              } @else {
                <span class="block truncate">{{ item.label }}</span>
              }
            </button>
          </li>
        }
      </ul>
    </div>

    <!-- RIGHT: Document viewer -->
    <div class="min-w-0 h-full flex items-center justify-center overflow-hidden md:flex-1">
      @if (selectedDocument(); as doc) {
        <div class="h-full w-full max-w-full rounded-lg overflow-hidden bg-white">
          <jhi-document-viewer class="w-full h-full object-contain" [documentId]="doc" [documentFile]="selectedFile()" />
        </div>
      }
    </div>
  </div>
</jhi-dialog>
