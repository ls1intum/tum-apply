<div
  class="flex flex-col gap-3 p-4 w-[clamp(15.5rem,90vw,20rem)] border-2 border-primary rounded-2xl max-[1280px]:w-[17.5rem] max-[1024px]:w-[14rem] max-[1024px]:p-[0.7rem] max-[1024px]:gap-2 max-[600px]:p-[0.45rem] max-[600px]:gap-[0.2rem] max-[480px]:w-[12.5rem] max-[550px]:w-[11rem] max-[550px]:p-[0.6rem] max-[550px]:gap-2 max-[400px]:w-[11.5rem]"
  [class.opacity-50]="disabled()"
  [class.border-background-disabled]="disabled()"
  [class.cursor-not-allowed]="disabled()"
  [class.pointer-events-none]="disabled()"
  [class.border-transparent]="placeholder()"
>
  @if (!placeholder()) {
    <!-- Header -->
    <div class="flex justify-between items-center h-8 gap-2 max-[1280px]:contents">
      <div class="flex items-center gap-[0.6rem] -ml-[0.55rem] max-[1280px]:order-1">
        <jhi-user-avatar [fullName]="fullName()" size="lg" />
        <div
          class="m-0 text-[1.25rem] font-bold flex flex-col max-[1280px]:text-[1.25rem] max-[1280px]:font-bold max-[1280px]:order-1 max-[1280px]:text-left max-[1280px]:flex-row max-[1280px]:items-baseline max-[1280px]:gap-[0.3rem] max-[1280px]:flex-wrap max-[1024px]:text-[1.1rem] max-[600px]:text-[0.85rem] max-[600px]:leading-[1.2] max-[600px]:p-[0.2rem] max-[480px]:text-[0.8rem] max-[550px]:text-[1rem] max-[400px]:text-[0.75rem] max-[400px]:p-[0.15rem]"
          [class.has-last]="!!nameParts().last"
        >
          <span class="whitespace-nowrap">{{ nameParts().first }}</span>
          <span class="mt-[0.1rem] max-[1280px]:mt-0">{{ nameParts().last }}</span>
        </div>
      </div>

      <jhi-tag
        class="w-[7rem] shrink-0 max-[1280px]:order-3 max-[1024px]:w-[8rem] max-[600px]:w-[7rem] max-[600px]:text-[0.55rem] max-[480px]:text-[0.52rem] max-[480px]:px-[0.18rem] max-[480px]:py-[0.1rem] max-[550px]:w-[8rem] max-[550px]:text-[0.55rem] max-[400px]:text-[0.5rem]"
        [text]="'evaluation.statusBadge.' + (applicationDetails()?.applicationState || '') | translate"
        [color]="stateSeverityMap[applicationDetails()?.applicationState!] || 'info'"
        [tooltipText]="'evaluation.statusBadge.tooltips.' + (applicationDetails()?.applicationState || '')"
      />
    </div>

    <!-- Job Title -->
    <div
      class="flex items-start gap-[0.6rem] text-text-disabled min-h-[3rem] -ml-[0.55rem] mt-[0.3rem] max-[1280px]:order-2 max-[1280px]:justify-self-start max-[1024px]:gap-[0.4rem] max-[1024px]:min-h-[2.3rem] max-[600px]:gap-[0.35rem] max-[600px]:min-h-[1.8rem] max-[600px]:p-[0.2rem] max-[550px]:gap-[0.4rem] max-[550px]:min-h-[2rem] max-[400px]:p-[0.15rem]"
    >
      <fa-icon
        class="text-primary w-[2.5rem] inline-flex justify-center shrink-0 mt-[0.12rem] max-[1280px]:text-[0.8rem] max-[600px]:text-[0.7rem] max-[550px]:text-[0.65rem] max-[400px]:text-[0.65rem]"
        [icon]="['fas', 'briefcase']"
      />
      <span
        class="[display:-webkit-box] [-webkit-line-clamp:2] [-webkit-box-orient:vertical] overflow-hidden text-ellipsis break-words leading-[1.4rem] max-h-[calc(1.4rem*2)] max-[1280px]:text-[0.95rem] max-[1280px]:leading-[1.25rem] max-[1280px]:max-h-[calc(1.25rem*2)] max-[1024px]:text-[0.9rem] max-[1024px]:leading-[1.2rem] max-[1024px]:max-h-[calc(1.2rem*2)] max-[600px]:text-[0.72rem] max-[600px]:leading-[1rem] max-[600px]:max-h-[calc(1rem*2)] max-[480px]:text-[0.68rem] max-[480px]:leading-[0.95rem] max-[480px]:max-h-[calc(0.95rem*2)] max-[550px]:text-[0.8rem] max-[550px]:leading-[1.1rem] max-[550px]:max-h-[calc(1.1rem*2)] max-[400px]:text-[0.65rem] max-[400px]:leading-[0.9rem] max-[400px]:max-h-[calc(0.9rem*2)]"
      >
        {{ applicationDetails()?.jobTitle }}
      </span>
    </div>

    <!--

    Rating and Comments removed for now

    <div class="rating">
      <jhi-rating [rating]="application()?.rating" />
      <div class="comments">
        <p>0</p>
        <fa-icon [icon]="['fas', 'comment-alt']" />
      </div>
    </div>

    -->
  }
</div>
