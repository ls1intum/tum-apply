<div class="px-4 pt-2 pb-2">
  <div class="flex flex-col mx-auto w-full max-w-72 gap-3 lg:mx-0">
    <div class="flex flex-col ai-score-block gap-2">
      <div class="flex mx-auto w-fit items-center justify-center gap-2">
        <div class="flex shrink-0" [class.opacity-50]="isScoreLoading() && displayedScore() !== undefined">
          <jhi-ai-score-ring [score]="displayedScore()" [isLoading]="isScoreLoading()" />
        </div>

        <div class="flex items-center gap-2">
          <h3
            class="m-0 text-base font-semibold text-text-secondary"
            jhiTranslate="jobCreationForm.positionDetailsSection.jobDescription.aiScoreTitle"
          ></h3>
          <jhi-info-icon
            [clickable]="true"
            ariaLabel="jobCreationForm.positionDetailsSection.jobDescription.aiScoreDialog.title"
            [shouldTranslate]="true"
            (clicked)="openScoreDialog()"
          />
        </div>
      </div>
      <!-- Inclusivity feedback text -->
      <p class="mt-0 mb-0 text-sm leading-6 text-text-tertiary text-center lg:text-left" [jhiTranslate]="scoreFeedback()"></p>
    </div>

    <hr class="m-0 w-full border-0 border-t border-border-default opacity-70" />

    <!-- Compliance Checker -->
    <div class="flex items-center justify-center gap-2 lg:justify-start">
      <h3
        class="m-0 text-base font-semibold text-text-secondary text-center lg:text-left"
        jhiTranslate="jobCreationForm.aiSidebar.complianceHeader"
      ></h3>
      <jhi-info-icon tooltip="jobCreationForm.aiSidebar.complianceTooltipText" tooltipPosition="top" [shouldTranslate]="true" />
    </div>

    <div class="flex flex-col gap-1">
      <p class="m-0 mb-1 text-xs text-text-tertiary" jhiTranslate="jobCreationForm.aiSidebar.filterByCategory"></p>

      <div class="flex flex-col gap-2">
        <jhi-status-pill
          labelKey="jobCreationForm.aiSidebar.critical"
          dotColor="bg-compliance-critical"
          [count]="criticalCount()"
          [isActive]="activeFilter() === ComplianceIssueCategoryEnum.CriticalAgg"
          [loading]="isAnalyzing()"
          (selected)="selectCategoryFilter(ComplianceIssueCategoryEnum.CriticalAgg)"
        />
        <jhi-status-pill
          labelKey="jobCreationForm.aiSidebar.transparency"
          dotColor="bg-compliance-transparency"
          [count]="transparencyCount()"
          [isActive]="activeFilter() === ComplianceIssueCategoryEnum.Transparency"
          [loading]="isAnalyzing()"
          (selected)="selectCategoryFilter(ComplianceIssueCategoryEnum.Transparency)"
        />
        <jhi-status-pill
          labelKey="jobCreationForm.aiSidebar.dsgvo"
          dotColor="bg-compliance-dsgvo"
          [count]="dsgvoCount()"
          [isActive]="activeFilter() === ComplianceIssueCategoryEnum.DsgvoMinimization"
          [loading]="isAnalyzing()"
          (selected)="selectCategoryFilter(ComplianceIssueCategoryEnum.DsgvoMinimization)"
        />
        <jhi-status-pill
          labelKey="jobCreationForm.aiSidebar.publicSector"
          dotColor="bg-compliance-public-sector"
          [count]="publicSectorCount()"
          [isActive]="activeFilter() === ComplianceIssueCategoryEnum.PublicSector"
          [loading]="isAnalyzing()"
          (selected)="selectCategoryFilter(ComplianceIssueCategoryEnum.PublicSector)"
        />
      </div>
    </div>

    <hr class="m-0 w-full border-0 border-t border-border-default opacity-70" />

    <div class="flex items-start justify-center gap-2 lg:justify-start">
      <h3
        class="m-0 text-base font-semibold text-text-secondary text-center lg:text-left"
        jhiTranslate="jobCreationForm.positionDetailsSection.jobDescription.aiHeaderText"
      ></h3>
      <!-- Tooltip with AI assistant hint -->
      <jhi-info-icon
        tooltip="jobCreationForm.positionDetailsSection.jobDescription.aiTooltipText"
        tooltipPosition="top"
        [shouldTranslate]="true"
      />
    </div>

    <p
      class="m-0 text-sm leading-6 text-text-tertiary text-center lg:text-left"
      jhiTranslate="jobCreationForm.positionDetailsSection.jobDescription.aiHelperText"
    ></p>

    <div>
      @if (isGenerating()) {
        <div class="flex w-full items-center justify-center gap-2 rounded-lg border border-border-default px-3 h-10">
          <jhi-progress-spinner classStyling="w-4 h-4" strokeWidth="4" />
          <span
            class="text-sm font-semibold text-text-primary whitespace-nowrap"
            jhiTranslate="jobCreationForm.positionDetailsSection.jobDescription.aiFillerText"
          ></span>
        </div>
      } @else {
        <jhi-button
          [label]="
            isRewriteMode()
              ? 'jobCreationForm.positionDetailsSection.jobDescription.aiButton2'
              : 'jobCreationForm.positionDetailsSection.jobDescription.aiButton1'
          "
          [shouldTranslate]="true"
          severity="primary"
          [icon]="buttonIcon()"
          classStyling="!w-full !justify-center !whitespace-nowrap"
          (click)="onGenerate()"
        />
      }
    </div>
  </div>
</div>

<jhi-dialog
  [visible]="scoreDialogVisible()"
  [modal]="true"
  [draggable]="false"
  [appendTo]="'body'"
  header="jobCreationForm.positionDetailsSection.jobDescription.aiScoreDialog.title"
  (visibleChange)="onScoreDialogVisibleChange($event)"
  classStyling="!w-[90vw] md:!w-[42rem] rounded-xs bg-background-default"
>
  <div class="space-y-6">
    <div class="text-center">
      <p
        class="m-0 text-lg font-semibold leading-6"
        jhiTranslate="jobCreationForm.positionDetailsSection.jobDescription.aiScoreDialog.summary"
      ></p>
    </div>
    <div class="mb-4">
      <jhi-info-box
        class="leading-relaxed block mb-6"
        message="jobCreationForm.positionDetailsSection.jobDescription.aiScoreDialog.summaryText"
      />
    </div>
    <div class="grid grid-rows-2 divide-y divide-border-default rounded-md border border-border-default">
      <div class="grid h-full gap-2 p-4">
        <p
          class="m-0 font-semibold leading-6"
          jhiTranslate="jobCreationForm.positionDetailsSection.jobDescription.aiScoreDialog.section1.title"
        ></p>
        <p
          class="m-0 leading-6 text-text-secondary"
          jhiTranslate="jobCreationForm.positionDetailsSection.jobDescription.aiScoreDialog.section1.body"
        ></p>
      </div>

      <div class="grid h-full gap-2 p-4">
        <p
          class="m-0 font-semibold leading-6"
          jhiTranslate="jobCreationForm.positionDetailsSection.jobDescription.aiScoreDialog.section2.title"
        ></p>
        <p
          class="m-0 leading-6 text-text-secondary"
          jhiTranslate="jobCreationForm.positionDetailsSection.jobDescription.aiScoreDialog.section2.body"
        ></p>
      </div>
    </div>
  </div>
</jhi-dialog>
