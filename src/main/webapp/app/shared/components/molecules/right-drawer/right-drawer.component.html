<p-drawer
  [visible]="open()"
  (visibleChange)="open.set($event)"
  position="right"
  [class]="panelClass()"
  [showCloseIcon]="showCloseIcon()"
  [dismissible]="dismissible()"
  [modal]="true"
>
  <ng-template #header>
    <ng-content select="[drawer-header]" />
  </ng-template>
  <ng-content />
</p-drawer>
