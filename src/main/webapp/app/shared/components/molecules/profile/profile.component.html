<div class="flex flex-1 flex-col items-center justify-center self-stretch">
  <form (ngSubmit)="onSubmit()" [formGroup]="form" class="flex w-full flex-col">
    <jhi-string-input
      [control]="form.controls.firstName"
      [required]="true"
      [shouldTranslate]="true"
      label="auth.register.texts.profile.firstName.label"
      placeholder="auth.register.texts.profile.firstName.placeholder"
    />

    <jhi-string-input
      [control]="form.controls.lastName"
      [required]="true"
      [shouldTranslate]="true"
      label="auth.register.texts.profile.lastName.label"
      placeholder="auth.register.texts.profile.lastName.placeholder"
    />

    <jhi-button
      [disabled]="form.invalid || loading()"
      [fullWidth]="true"
      [loading]="loading()"
      [shouldTranslate]="true"
      label="auth.register.buttons.continue"
      type="submit"
    />
  </form>
</div>
