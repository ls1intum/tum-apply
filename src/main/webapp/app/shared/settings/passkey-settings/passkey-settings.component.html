@if (loaded()) {
  <section class="my-6">
    <div class="flex flex-col gap-4">
      <div class="flex flex-col gap-4 sm:flex-row sm:items-start sm:justify-between">
        <div class="min-w-0 flex-1">
          <h2 class="font-medium text-text-primary text-lg" jhiTranslate="settings.passkeys.header"></h2>
          <p class="mt-3 text-md text-text-secondary" jhiTranslate="settings.passkeys.description"></p>
        </div>

        <jhi-button
          label="settings.passkeys.actions.create"
          [shouldTranslate]="true"
          icon="plus"
          [disabled]="!canManagePasskeys()"
          [loading]="creating()"
          (click)="createPasskey()"
        />
      </div>

      @if (!canManagePasskeys()) {
        <div class="rounded-xl border border-border-default bg-background-surface px-4 py-4">
          <p class="font-medium text-text-primary" jhiTranslate="settings.passkeys.unavailable.title"></p>
          <p class="mt-2 text-sm text-text-secondary" jhiTranslate="settings.passkeys.unavailable.description"></p>
        </div>
      } @else if (loadFailed()) {
        <div class="rounded-xl border border-border-default bg-background-surface px-4 py-5">
          <p class="font-medium text-text-primary" jhiTranslate="settings.passkeys.error.title"></p>
          <p class="mt-2 text-sm text-text-secondary" jhiTranslate="settings.passkeys.error.description"></p>
        </div>
      } @else if (!hasPasskeys()) {
        <div class="rounded-xl border border-dashed border-border-default bg-background-surface px-4 py-5">
          <p class="font-medium text-text-primary" jhiTranslate="settings.passkeys.empty.title"></p>
          <p class="mt-2 text-sm text-text-secondary" jhiTranslate="settings.passkeys.empty.description"></p>
        </div>
      } @else {
        <div class="flex flex-col gap-3">
          @for (passkey of passkeyItems(); track passkey.id) {
            <div class="rounded-xl border border-border-default bg-background-surface px-4 py-4">
              <div class="flex flex-col gap-3 sm:flex-row sm:items-center sm:justify-between">
                <div class="min-w-0 flex-1">
                  <p class="truncate font-medium text-text-primary">{{ passkey.label }}</p>

                  @if (passkey.createdAtLabel; as createdAtLabel) {
                    <p
                      class="mt-1 text-sm text-text-secondary"
                      jhiTranslate="settings.passkeys.createdAt"
                      [translateValues]="{ date: createdAtLabel }"
                    ></p>
                  }
                </div>

                <div class="flex items-center justify-end gap-2">
                  <jhi-confirm-dialog
                    #removePasskeyDialog
                    [showOpenButton]="false"
                    [label]="'button.remove' | translate"
                    [header]="'settings.passkeys.removeConfirm.header' | translate"
                    [message]="'settings.passkeys.removeConfirm.message' | translate: { name: passkey.label }"
                    confirmIcon="trash"
                    severity="danger"
                    [disabled]="passkey.removeDisabled"
                    (confirmed)="removePasskey(passkey.id)"
                  />
                  <jhi-button
                    [shouldTranslate]="true"
                    label="button.remove"
                    icon="trash"
                    severity="danger"
                    variant="outlined"
                    [disabled]="passkey.removeDisabled"
                    [loading]="passkey.removing"
                    (click)="removePasskeyDialog.confirm()"
                  />
                </div>
              </div>
            </div>
          }
        </div>
      }
    </div>
  </section>
}
