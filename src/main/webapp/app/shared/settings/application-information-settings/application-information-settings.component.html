<form [formGroup]="applicationInfoForm()">
  <div class="flex justify-between items-center mb-6">
    <div [innerHTML]="('settings.applicationInformation.description' | translate).replace(/\n/g, '<br>')"></div>
  </div>
  <p-divider layout="horizontal">
    <span jhiTranslate="entity.applicationPage1.label.curriculumVitae"></span>
  </p-divider>
  <div class="w-full mb-6">
    <span class="custom-label">
      <span jhiTranslate="entity.applicationPage1.label.curriculumVitae"></span>
    </span>
    <div class="flex flex-col gap-3">
      <jhi-upload-button
        documentType="CV"
        [applicationId]="uploadHostId"
        uploadTarget="applicantProfile"
        [(documentIds)]="cvDocuments"
        [allowMultiple]="false"
        [compact]="true"
      />
      <jhi-ai-extraction-box
        [applicationId]="uploadHostId"
        [documentIds]="cvDocuments() ?? []"
        [isCv]="true"
        [saveData]="false"
        [helperTextKey]="'entity.aiExtraction.helperCv'"
        (extracted)="onAiDataExtracted($event)"
      />
    </div>
  </div>
  <p-divider layout="horizontal"><span jhiTranslate="entity.applicationPage1.section.contactInformation"></span></p-divider>
  <div class="form-row">
    <div class="form-field">
      <jhi-string-input
        class="w-full inline-block mr-4"
        [label]="'entity.applicationPage1.label.firstName'"
        id="firstName"
        [(model)]="data().firstName"
        [control]="applicationInfoForm().controls.firstName"
        [shouldTranslate]="true"
      />
    </div>
    <div class="form-field">
      <jhi-string-input
        class="w-full inline-block mr-4"
        [label]="'entity.applicationPage1.label.lastName'"
        id="lastName"
        [(model)]="data().lastName"
        [control]="applicationInfoForm().controls.lastName"
        [shouldTranslate]="true"
      />
    </div>
  </div>

  <div class="form-row">
    <div class="form-field">
      <jhi-string-input
        class="w-full inline-block mr-4"
        [label]="'entity.applicationPage1.label.email'"
        [disabled]="disabledEmail"
        id="email"
        [(model)]="data().email"
        [control]="applicationInfoForm().controls.email"
        [shouldTranslate]="true"
      />
    </div>
    <div class="form-field">
      <jhi-string-input
        class="w-full inline-block mr-4"
        [label]="'entity.applicationPage1.label.phoneNumber'"
        id="phoneNumber"
        [(model)]="data().phoneNumber"
        [control]="applicationInfoForm().controls.phoneNumber"
        [shouldTranslate]="true"
      />
    </div>
  </div>
  <p-divider layout="horizontal"><span jhiTranslate="entity.applicationPage1.section.voluntaryInformation"></span></p-divider>
  <div class="form-row mb-6">
    <div class="form-field">
      <jhi-select
        width="100%"
        label="entity.applicationPage1.label.gender"
        [items]="selectGenderLocal"
        placeholder="entity.applicationPage1.placeholder.selectGender"
        id="gender"
        [(selected)]="data().gender"
        (selectedChange)="updateSelect('gender', $event)"
        [showClear]="true"
        [translateItems]="true"
      />
    </div>
    <div class="form-field">
      <jhi-select
        width="100%"
        label="entity.applicationPage1.label.nationality"
        [items]="selectNationalityComputed()"
        placeholder="entity.applicationPage1.placeholder.selectNationality"
        id="nationality"
        [(selected)]="data().nationality"
        (selectedChange)="updateSelect('nationality', $event)"
        [filter]="true"
        [showClear]="true"
        [dataKey]="'value'"
      />
    </div>
  </div>

  <div class="form-row">
    <div class="form-field">
      <jhi-string-input
        class="w-full inline-block mr-4"
        [label]="'entity.applicationPage1.label.website'"
        id="website"
        [(model)]="data().website"
        [control]="applicationInfoForm().controls.website"
        [shouldTranslate]="true"
      />
    </div>
    <div class="form-field">
      <jhi-string-input
        class="w-full inline-block mr-4"
        [label]="'entity.applicationPage1.label.linkedIn'"
        id="linkedIn"
        [(model)]="data().linkedIn"
        [control]="applicationInfoForm().controls.linkedIn"
        [shouldTranslate]="true"
      />
    </div>
  </div>

  <div class="form-row mb-6">
    <div class="form-field">
      <jhi-datepicker
        [selectedDate]="data().dateOfBirth"
        [label]="'entity.applicationPage1.label.dateOfBirth'"
        width="100%"
        (selectedDateChange)="setDateOfBirth($event)"
        [minDate]="minDate"
        [maxDate]="maxDate"
        [defaultDate]="defaultBirthDate"
        [shouldTranslate]="true"
      />
    </div>
    <div class="form-field"></div>
  </div>

  <p-divider layout="horizontal"><span jhiTranslate="entity.applicationPage1.section.address"></span></p-divider>

  <div class="form-row">
    <div class="form-field">
      <jhi-string-input
        class="w-full inline-block mr-4"
        [label]="'entity.applicationPage1.label.street'"
        id="street"
        [(model)]="data().street"
        [control]="applicationInfoForm().controls.street"
        [shouldTranslate]="true"
      />
    </div>
  </div>

  <div class="form-row">
    <div class="form-field">
      <jhi-string-input
        class="w-full inline-block mr-4"
        [label]="'entity.applicationPage1.label.city'"
        id="city"
        [(model)]="data().city"
        [control]="applicationInfoForm().controls.city"
        [shouldTranslate]="true"
      />
    </div>
  </div>

  <div class="form-row">
    <div class="form-field">
      <jhi-select
        label="entity.applicationPage1.label.country"
        placeholder="entity.applicationPage1.placeholder.selectCountry"
        id="country"
        [(selected)]="data().country"
        width="100%"
        [items]="selectCountriesLocal()"
        (selectedChange)="updateSelect('country', $event)"
        [filter]="true"
        [showClear]="true"
        [dataKey]="'value'"
      />
    </div>
    <div class="form-field">
      <jhi-string-input
        [label]="'entity.applicationPage1.label.postcode'"
        id="postcode"
        [(model)]="data().postcode"
        [control]="applicationInfoForm().controls.postcode"
        [shouldTranslate]="true"
      />
    </div>
  </div>

  <ng-template #savingBadgeTemplate>
    <jhi-saving-badge [state]="savingState()" />
  </ng-template>
  <jhi-sticky-footer-shell [statusTemplate]="savingBadgeTemplate" />
</form>
