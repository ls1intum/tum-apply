<div class="page-container">
  <div class="page-header">
    <h1 jhiTranslate="settings.header">Settings</h1>
  </div>

  <jhi-tab-view
    [tabs]="tabs()"
    [activeTabId]="activeTab()"
    [lazyLoad]="true"
    [tabPanelsClass]="'w-full max-w-4xl mx-auto px-4 sm:px-5 md:px-6 lg:px-8 xl:px-10'"
    (tabChange)="onTabChange($event)"
  >
    <ng-template jhiTabPanel="general">
      <jhi-profile-picture-settings />
      <p-divider layout="horizontal" />

      <div class="flex flex-col sm:flex-row sm:items-center justify-between my-6 gap-4">
        <div class="flex-1 min-w-0">
          <div class="flex items-center gap-3">
            <h2 class="font-medium text-text-primary text-lg" jhiTranslate="settings.appearance.header"></h2>
          </div>
          <p class="mt-3 text-md text-text-secondary" jhiTranslate="settings.appearance.theme.label"></p>
        </div>
        <jhi-select [items]="themeOptions" [selected]="selectedTheme()" (selectedChange)="onThemeChange($event)" [translateItems]="true" />
      </div>

      @if (role() !== UserShortDTORolesEnum.Admin) {
        <p-divider class="my-6" layout="horizontal" />
        <jhi-ai-consent-settings [currentRole]="role()" />
      }
    </ng-template>

    <ng-template jhiTabPanel="notifications">
      <jhi-notification-settings class="w-full" [currentRole]="role()" />
    </ng-template>

    <ng-template jhiTabPanel="application-information">
      <jhi-application-information-settings class="w-full" />
    </ng-template>

    <ng-template jhiTabPanel="documents">
      <jhi-settings-documents class="w-full" />
    </ng-template>
  </jhi-tab-view>
</div>
