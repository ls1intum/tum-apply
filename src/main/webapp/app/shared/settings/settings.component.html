<div class="page-container">
  <div class="page-header">
    <h1 jhiTranslate="settings.header">Settings</h1>
  </div>

  <jhi-tab-view
    [tabs]="tabs()"
    [activeTabId]="activeTab()"
    [lazyLoad]="true"
    [tabPanelsClass]="'px-4 xl:px-32 2xl:px-64'"
    (tabChange)="onTabChange($event)"
  >
    <ng-template jhiTabPanel="general">
      <jhi-profile-picture-settings />
      <p-divider layout="horizontal" />

      <div class="mb-4">
        <div class="text-lg font-semibold mb-1">
          <h2 jhiTranslate="settings.appearance.header"></h2>
        </div>
        <div class="pb-4">
          <div class="flex flex-row items-center justify-between">
            <label class="text-text-secondary" jhiTranslate="settings.appearance.theme.label"></label>
            <jhi-select
              [items]="themeOptions"
              [selected]="selectedTheme()"
              (selectedChange)="onThemeChange($event)"
              [translateItems]="true"
            />
          </div>
        </div>
      </div>
    </ng-template>

    <ng-template jhiTabPanel="notifications">
      <jhi-notification-settings class="w-full" [currentRole]="role()" />
    </ng-template>

    <ng-template jhiTabPanel="personal-information">
      <jhi-personal-information-settings class="w-full" />
    </ng-template>

    <ng-template jhiTabPanel="documents">
      <jhi-settings-documents class="w-full" />
    </ng-template>
  </jhi-tab-view>
</div>
