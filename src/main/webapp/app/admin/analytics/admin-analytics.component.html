<div class="page-container">
  <div class="header-container">
    <div class="page-header">
      <h1 jhiTranslate="analytics.title">AI Analytics</h1>
    </div>
    <div class="flex items-center gap-2">
      <jhi-select
        [items]="rangeOptions"
        [selected]="selectedRangeOption()"
        [translateItems]="true"
        width="14rem"
        (selectedChange)="onRangeChange($event)"
      />
    </div>
  </div>

  <p class="text-text-secondary mb-4" jhiTranslate="analytics.description"></p>

  <div class="mb-6 flex w-full max-w-md items-center gap-1 rounded bg-background-surface p-1 dark:bg-background-surface-alt">
    @for (option of featureOptions; track option.value) {
      <jhi-segment-button
        class="flex-1"
        [label]="option.label"
        [active]="selectedFeature() === option.value"
        (buttonClick)="onFeatureChange(option.value)"
      />
    }
  </div>

  @if (isLoading()) {
    <div class="flex justify-center py-16">
      <jhi-progress-spinner classStyling="w-12 h-12" strokeWidth="4" />
    </div>
  } @else if (totalTriggers() === 0) {
    <div class="text-text-secondary flex justify-center py-16" jhiTranslate="analytics.empty"></div>
  } @else {
    <jhi-line-chart [labels]="chartLabels()" [datasets]="chartDatasets()" [heightPx]="380" />

    <div class="my-6 grid grid-cols-1 gap-4 sm:grid-cols-3">
      <div class="bg-background-surface border-border-default rounded-lg border p-5 text-center">
        <div class="text-text-primary text-3xl font-bold">{{ totalTriggers() }}</div>
        <div class="text-text-secondary mt-1 text-sm" jhiTranslate="analytics.stats.totalCalls"></div>
      </div>
      <div class="bg-background-surface border-border-default rounded-lg border p-5 text-center">
        <div class="text-text-primary text-3xl font-bold">{{ generationTotal() }}</div>
        <div class="text-text-secondary mt-1 text-sm" jhiTranslate="analytics.feature.jobDescriptionGeneration"></div>
      </div>
      <div class="bg-background-surface border-border-default rounded-lg border p-5 text-center">
        <div class="text-text-primary text-3xl font-bold">{{ extractionTotal() }}</div>
        <div class="text-text-secondary mt-1 text-sm" jhiTranslate="analytics.feature.documentExtraction"></div>
      </div>
    </div>
  }
</div>
