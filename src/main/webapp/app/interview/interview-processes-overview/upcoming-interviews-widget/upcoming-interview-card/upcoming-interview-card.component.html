<div
  (click)="navigateToAssessment($event)"
  (keydown.enter)="navigateToAssessment($event)"
  role="link"
  tabindex="0"
  class="flex flex-col p-3 bg-background-default border rounded-lg border-border-default hover:bg-background-surface gap-2 group h-[8.5rem] w-full overflow-hidden cursor-pointer"
>
  <!-- Row 1: Avatar + Name -->
  <div class="flex items-center gap-2 w-full">
    <jhi-user-avatar [fullName]="intervieweeName()" [avatarUrl]="avatarUrl()" size="sm" class="flex-shrink-0" />
    <span class="text-sm font-bold text-text-primary truncate block flex-1" [title]="intervieweeName()">
      {{ intervieweeName() }}
    </span>
  </div>

  <!-- Row 2: Time (Large & Bold) -->
  <div class="flex items-center gap-2 w-full">
    <div class="flex justify-center w-8 flex-shrink-0">
      <fa-icon icon="clock" class="text-xs text-primary" />
    </div>
    <span class="text-sm font-bold text-text-primary truncate block flex-1">
      {{ formattedTimeRange() }}
    </span>
  </div>

  <!-- Row 3: Location (Clickable if URL) -->
  <div class="flex items-center gap-2 w-full text-xs text-text-secondary">
    <div class="flex justify-center w-8 flex-shrink-0">
      <fa-icon [icon]="isVirtual() ? 'video' : 'location-dot'" class="text-xs text-primary" />
    </div>
    @if (meetingUrl()) {
      <a
        [href]="meetingUrl()"
        target="_blank"
        (click)="$event.stopPropagation()"
        class="text-primary hover:underline truncate block flex-1"
        [title]="location()"
      >
        {{ location() }}
      </a>
    } @else {
      <span class="truncate block flex-1" [title]="location()">
        {{ location() }}
      </span>
    }
  </div>

  <!-- Row 4: Job -->
  <div class="flex items-center gap-2 w-full text-xs text-text-secondary">
    <div class="flex justify-center w-8 flex-shrink-0">
      <fa-icon icon="briefcase" class="text-xs text-primary" />
    </div>
    <span class="truncate block flex-1" [title]="interview().jobTitle">
      {{ interview().jobTitle }}
    </span>
  </div>
</div>
