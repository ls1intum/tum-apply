<article
  (click)="onCardClick()"
  (keydown.enter)="onCardClick()"
  tabindex="0"
  role="button"
  class="flex flex-row rounded-lg border border-border-default bg-background-default overflow-hidden cursor-pointer transition-all hover:bg-background-surface group"
  [class.opacity-80]="isClosed()"
>
  <!-- Image -->
  <div
    class="w-1/3 min-h-[8rem] bg-cover bg-center shrink-0"
    [class.bg-background-surface-alt]="isClosed()"
    [class.bg-primary]="!isClosed()"
    [style.backgroundImage]="process().imageUrl ? 'url(' + process().imageUrl + ')' : null"
  ></div>

  <!-- Content -->
  <div class="flex-1 flex flex-col justify-between p-4 gap-4">
    <!-- Title + Tag -->
    <div class="flex items-start justify-between gap-3">
      <h3 class="text-base font-semibold line-clamp-2 m-0 leading-tight text-text flex-1 group-hover:text-primary transition-colors">
        {{ process().jobTitle }}
      </h3>
      <div class="shrink-0">
        <jhi-tag [text]="isClosed() ? 'Closed' : 'Active'" [color]="isClosed() ? 'secondary' : 'success'" />
      </div>
    </div>

    <!-- Warning (compact, between title and metrics) -->
    @if (warningMessage()) {
      <jhi-message
        severity="warn"
        size="small"
        [message]="warningMessage()!"
        [shouldTranslate]="true"
        [translationParams]="{ invited: process().invitedCount, slots: totalSlots() }"
      />
    }

    <!-- Metrics Row -->
    <div class="flex flex-wrap items-end justify-start gap-x-6 gap-y-4 pt-1">
      <!-- Metric: Uncontacted -->
      <div class="flex flex-col">
        <span class="text-xs text-text-secondary font-semibold" jhiTranslate="interview.overview.stats.uncontacted">Uncontacted</span>
        <div class="flex items-center gap-2 mt-0.5">
          <fa-icon icon="user" class="text-lg" [class.text-text-secondary]="isClosed()" [class.icon]="!isClosed()" />
          <span class="text-lg font-bold leading-none" [class.text-text-secondary]="isClosed()" [class.text-text]="!isClosed()">{{
            process().uncontactedCount
          }}</span>
        </div>
      </div>

      <!-- Metric: Invited -->
      <div class="flex flex-col">
        <span class="text-xs text-text-secondary font-semibold" jhiTranslate="interview.overview.stats.invited">Invited</span>
        <div class="flex items-center gap-2 mt-0.5">
          <fa-icon icon="envelope" class="text-lg" [class.text-text-secondary]="isClosed()" [class.icon]="!isClosed()" />
          <span class="text-lg font-bold leading-none" [class.text-text-secondary]="isClosed()" [class.text-text]="!isClosed()">{{
            process().invitedCount
          }}</span>
        </div>
      </div>

      <!-- Metric: Completed -->
      <div class="flex flex-col">
        <span class="text-xs text-text-secondary font-semibold" jhiTranslate="interview.overview.stats.completed">Completed</span>
        <div class="flex items-center gap-2 mt-0.5">
          <fa-icon icon="clipboard-check" class="text-lg" [class.text-text-secondary]="isClosed()" [class.icon]="!isClosed()" />
          <span class="text-lg font-bold leading-none" [class.text-text-secondary]="isClosed()" [class.text-text]="!isClosed()">{{
            process().completedCount
          }}</span>
        </div>
      </div>

      <!-- Metric: Booked (Scheduled / Total Slots) -->
      <div class="flex flex-col">
        <span class="text-xs text-text-secondary font-semibold" jhiTranslate="interview.overview.stats.booked">Booked</span>
        <div class="flex items-center gap-2 mt-0.5">
          <fa-icon icon="calendar-check" class="text-lg" [class.text-text-secondary]="isClosed()" [class.icon]="!isClosed()" />
          <span class="text-lg font-bold leading-none" [class.text-text-secondary]="isClosed()" [class.text-text]="!isClosed()">
            {{ process().scheduledCount }} / {{ totalSlots() }}
          </span>
        </div>
      </div>
    </div>
  </div>
</article>
