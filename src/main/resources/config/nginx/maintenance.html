<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>TUMApply - Maintenance</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" href="favicon.ico" />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html {
        height: 100%;
      }

      body {
        min-height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
        background: #ffffff;
        color: #1d385d;
        padding: 2rem;
      }

      .container {
        max-width: 37.5rem;
        width: 100%;
        text-align: center;
      }

      .logo {
        margin-bottom: 2.5rem;
      }

      .logo img {
        width: 11.25rem;
        height: 11.25rem;
        object-fit: contain;
      }

      /* Animated gear icon */
      .gear-wrapper {
        display: inline-block;
        position: relative;
        padding-right: 1.125rem;
        padding-bottom: 0.375rem;
        margin-bottom: 2rem;
      }

      .gear {
        display: block;
        width: 3rem;
        height: 3rem;
        color: #3070b3;
        animation: spin 6s linear infinite;
      }

      .gear-small {
        display: block;
        width: 2rem;
        height: 2rem;
        color: #5a97d6;
        animation: spin-reverse 4s linear infinite;
        position: absolute;
        right: 0;
        bottom: 0;
      }

      @keyframes spin {
        from {
          transform: rotate(0deg);
        }
        to {
          transform: rotate(360deg);
        }
      }

      @keyframes spin-reverse {
        from {
          transform: rotate(0deg);
        }
        to {
          transform: rotate(-360deg);
        }
      }

      h1 {
        font-size: 1.75rem;
        font-weight: 700;
        color: #3070b3;
        margin-bottom: 1rem;
      }

      .divider {
        width: 3.75rem;
        height: 0.25rem;
        background: linear-gradient(90deg, #3070b3, #5a97d6);
        border-radius: 0.125rem;
        margin: 0 auto 2rem;
      }

      .message {
        font-size: 1.1rem;
        line-height: 1.7;
        color: #4a5568;
        margin-bottom: 2rem;
      }

      .footer {
        font-size: 0.95rem;
        color: #4a5568;
        margin-top: 1.5rem;
      }

      .footer a {
        color: #3070b3;
        text-decoration: underline;
        font-weight: 600;
      }

      .footer a:hover {
        text-decoration: underline;
      }

      @media (max-width: 30rem) {
        body {
          padding: 1.5rem;
        }

        h1 {
          font-size: 1.4rem;
        }

        .message {
          font-size: 1rem;
        }

        .logo img {
          width: 8.75rem;
          height: 8.75rem;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <!-- TUM Apply Logo -->
      <div class="logo">
        <img src="tum-apply-logo.svg" alt="TUM Apply" />
      </div>

      <!-- Animated gears -->
      <div class="gear-wrapper">

          <path

            stroke-linejoin="round"
            d="M9.594 3.94c.09-.542.56-.94 1.11-.94h2.593c.55 0 1.02.398 1.11.94l.213 1.281c.063.374.313.686.645.87.074.04.147.083.22.127.325.196.72.257 1.075.124l1.217-.456a1.125 1.125 0 0 1 1.37.49l1.296 2.247a1.125 1.125 0 0 1-.26 1.431l-1.003.827c-.293.241-.438.613-.43.992a7.723 7.723 0 0 1 0 .255c-.008.378.137.75.43.991l1.004.827c.424.35.534.955.26 1.43l-1.298 2.247a1.125 1.125 0 0 1-1.369.491l-1.217-.456c-.355-.133-.75-.072-1.076.124a6.47 6.47 0 0 1-.22.128c-.331.183-.581.495-.644.869l-.213 1.281c-.09.543-.56.94-1.11.94h-2.594c-.55 0-1.019-.398-1.11-.94l-.213-1.281c-.062-.374-.312-.686-.644-.87a6.52 6.52 0 0 1-.22-.127c-.325-.196-.72-.257-1.076-.124l-1.217.456a1.125 1.125 0 0 1-1.369-.49l-1.297-2.247a1.125 1.125 0 0 1 .26-1.431l1.004-.827c.292-.24.437-.613.43-.991a6.932 6.932 0 0 1 0-.255c.007-.38-.138-.751-.43-.992l-1.004-.827a1.125 1.125 0 0 1-.26-1.43l1.297-2.247a1.125 1.125 0 0 1 1.37-.491l1.216.456c.356.133.751.072 1.076-.124.072-.044.146-.086.22-.128.332-.183.582-.495.644-.869l.214-1.28Z"
          />
          <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z" />
        </svg>
      </div>

      <h1>Maintenance in Progress</h1>

      <div class="divider"></div>

      <p class="message">Due to urgent maintenance work, this service is currently offline. We hope to resume operations very soon.</p>

      <p class="message">Thank you for your understanding and support.</p>

      <p class="footer">
        For urgent questions, please contact our TUMApply support at:<br>
        <a href="mailto:support-tum-apply.aet@xcit.tum.de">support-tum-apply.aet@xcit.tum.de</a>
      </p>
    </div>
  </body>
</html>
