# ===================================================================
# Spring Boot configuration.
#
# This configuration is used for unit/integration tests.
#
# More information on profiles: https://www.jhipster.tech/profiles/
# More information on configuration properties: https://www.jhipster.tech/common-application-properties/
# ===================================================================

# ===================================================================
# Standard Spring Boot properties.
# Full reference is available at:
# http://docs.spring.io/spring-boot/docs/current/reference/html/common-application-properties.html
# ===================================================================

spring:
  application:
    name: TUMApply
  # Replace by 'prod, faker' to add the faker context and have sample data loaded in production
  liquibase:
    contexts: test
  jackson:
    datatype:
      date-time:
        write-durations-as-timestamps: false
  jpa:
    properties:
      hibernate:
        type:
          preferred_uuid_jdbc_type: CHAR
  mail:
    host: localhost
  main:
    allow-bean-definition-overriding: true
  messages:
    basename: i18n/messages
  task:
    execution:
      thread-name-prefix: tum-apply-task-
      pool:
        core-size: 1
        max-size: 50
        queue-capacity: 10000
    scheduling:
      thread-name-prefix: tum-apply-scheduling-
      pool:
        size: 20
  thymeleaf:
    mode: HTML

server:
  port: 10344
  address: localhost

# ===================================================================
# JHipster specific properties
#
# Full reference is available at: https://www.jhipster.tech/common-application-properties/
# ===================================================================
jhipster:
  clientApp:
    name: 'tumApplyApp'
  mail:
    from: TUMApply@localhost.com
    base-url: http://127.0.0.1:8080
  logging:
    # To test json console appender
    use-json-format: false
    logstash:
      enabled: false
      host: localhost
      port: 5000
      ring-buffer-size: 512

# ===================================================================
# Application specific properties
# Add your own application properties here, see the ApplicationProperties class
# to have type-safe configuration, like in the JHipsterProperties above
#
# More documentation is available at:
# https://www.jhipster.tech/common-application-properties/
# ===================================================================

# application:
management:
  health:
    mail:
      enabled: false

aet:
  storage:
    root: build/test-docs
    max-size-bytes: 26214400
    image-root: ${java.io.tmpdir}/test-images
    max-image-size-bytes: 5242880
  email:
    enabled: false
  download:
    deterministic-zip: true
  client:
    url:

keycloak:
  url: http://localhost:9080
  tum-login-realm: tumidpldap
  external-login-realm: external-login
  client-id: tumapply-client
  users:
    admin:
      username: admin
      password: admin
  server:
    external:
      client-id: tumapply-server-client
      client-secret: tumapply-server-secret
    tum:
      client-id: tumapply-server-client
      client-secret: tumapply-server-secret
  admin:
    tum:
      client-id: tumapply-admin-api
      client-secret: tumapply-admin-api-secret
    external:
      client-id: tumapply-admin-api
      client-secret: tumapply-admin-api-secret

security:
  otp:
    length: 8
    ttl-seconds: 900
    max-attempts: 6
    resend-cooldown-seconds: 60
    hmac-secret: 3vWK1lE1FnrjAovOmWwn8O9xqq5WTtNOY/NUdSAKmoQ=

app:
  token:
    issuer: https://tumapply.test
    kid: tumapply-test
    azp: tumapply-internal
    access-ttl-seconds: 300
    refresh-ttl-seconds: 2592000
    rsa-private-key:
    rsa-public-key:
